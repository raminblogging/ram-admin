<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ram.OS</title>
  <script>
    // GitHub Pages SPA redirect hack
    // Converts /path/to/page into /?/path/to/page so index.html handles it
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
      l.pathname.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
</html>
